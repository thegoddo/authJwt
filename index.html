<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Primetrade - Task Dashboard</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f4f7f6;
        color: #333;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }
      h1,
      h2 {
        color: #2c3e50;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin: 8px 0 15px;
        border: 1px solid #ddd;
        border-radius: 4px;
        box-sizing: border-box;
      }
      button {
        background-color: #3498db;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
      }
      button:hover {
        background-color: #2980b9;
      }
      .btn-danger {
        background-color: #e74c3c;
      }
      .btn-danger:hover {
        background-color: #c0392b;
      }
      .btn-secondary {
        background-color: #95a5a6;
      }
      .alert {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 4px;
        display: none;
      }
      .alert.success {
        background-color: #d4edda;
        color: #155724;
        display: block;
      }
      .alert.error {
        background-color: #f8d7da;
        color: #721c24;
        display: block;
      }
      .task-card {
        border: 1px solid #eee;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 4px;
        background-color: #fafafa;
      }
      .task-actions {
        margin-top: 10px;
      }
      #dashboard-section,
      #auth-section {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="alert-box" class="alert"></div>

      <div id="auth-section">
        <h1>Primetrade Portal</h1>
        <p>Login or Register to access the dashboard.</p>

        <h2>Login</h2>
        <form id="login-form">
          <input
            type="text"
            id="login-username"
            placeholder="Username"
            required
          />
          <input
            type="password"
            id="login-password"
            placeholder="Password"
            required
          />
          <button type="submit">Login</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee" />

        <h2>Register</h2>
        <form id="register-form">
          <input
            type="text"
            id="reg-username"
            placeholder="Username"
            required
          />
          <input
            type="password"
            id="reg-password"
            placeholder="Password"
            required
          />
          <button type="submit" class="btn-secondary">Register</button>
        </form>
      </div>

      <div id="dashboard-section">
        <div
          style="
            display: flex;
            justify-content: space-between;
            align-items: center;
          "
        >
          <h1>Task Dashboard</h1>
          <button onclick="logout()" class="btn-secondary">Logout</button>
        </div>

        <div
          style="
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 20px;
          "
        >
          <h3>Create New Task</h3>
          <form id="create-task-form">
            <input
              type="text"
              id="task-title"
              placeholder="Task Title"
              required
            />
            <textarea
              id="task-content"
              placeholder="Task Content"
              rows="3"
            ></textarea>
            <button type="submit">Create Task</button>
          </form>
        </div>

        <h2>Your Tasks</h2>
        <div id="task-list">Loading tasks...</div>
      </div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:5000/api/v1";
      let token = localStorage.getItem("jwt_token");
      let globalTasks = [];

      function init() {
        if (token) {
          document.getElementById("auth-section").style.display = "none";
          document.getElementById("dashboard-section").style.display = "block";
          fetchTasks();
        } else {
          document.getElementById("auth-section").style.display = "block";
          document.getElementById("dashboard-section").style.display = "none";
        }
      }

      function showAlert(msg, isError = false) {
        const alertBox = document.getElementById("alert-box");
        alertBox.textContent = msg;
        alertBox.className = `alert ${isError ? "error" : "success"}`;
        setTimeout(() => (alertBox.className = "alert"), 4000);
      }

      function escapeHTML(str) {
        let div = document.createElement("div");
        div.innerText = str || "";
        return div.innerHTML;
      }

      document
        .getElementById("register-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("reg-username").value;
          const password = document.getElementById("reg-password").value;

          const res = await fetch(`${API_URL}/auth/register`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();
          if (res.ok) {
            showAlert("Registration successful! Please login.");
            document.getElementById("register-form").reset();
          } else {
            showAlert(data.msg, true);
          }
        });

      document
        .getElementById("login-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("login-username").value;
          const password = document.getElementById("login-password").value;

          const res = await fetch(`${API_URL}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });
          const data = await res.json();

          if (res.ok) {
            token = data.access_token;
            localStorage.setItem("jwt_token", token);
            showAlert("Logged in successfully!");
            init();
          } else {
            showAlert(data.msg, true);
          }
        });

      function logout() {
        localStorage.removeItem("jwt_token");
        token = null;
        init();
      }

      async function fetchTasks() {
        const res = await fetch(`${API_URL}/tasks/`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401 || res.status === 422) {
          logout();
          showAlert("Session expired. Please login again.", true);
          return;
        }

        const tasks = await res.json();
        globalTasks = tasks; // Save the tasks globally so the buttons can find them securely

        const taskList = document.getElementById("task-list");
        taskList.innerHTML = "";

        if (tasks.length === 0) {
          taskList.innerHTML = "<p>No tasks found. Create one above!</p>";
          return;
        }

        tasks.forEach((task) => {
          taskList.innerHTML += `
                <div class="task-card">
                    <h3 style="margin-top: 0;">${escapeHTML(task.title)}</h3>
                    <p>${escapeHTML(task.content)}</p>
                    <div class="task-actions">
                        <button onclick="editTask(${task.id})" class="btn-secondary">Edit</button>
                        <button onclick="deleteTask(${task.id})" class="btn-danger">Delete</button>
                    </div>
                </div>
            `;
        });
      }

      document
        .getElementById("create-task-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const title = document.getElementById("task-title").value;
          const content = document.getElementById("task-content").value;

          const res = await fetch(`${API_URL}/tasks/`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify({ title, content }),
          });
          const data = await res.json();

          if (res.ok) {
            showAlert("Task created!");
            document.getElementById("create-task-form").reset();
            fetchTasks();
          } else {
            showAlert(data.msg, true);
          }
        });

      async function editTask(id) {
        const task = globalTasks.find((t) => t.id === id);
        if (!task) return;

        const newTitle = prompt("Edit Task Title:", task.title);
        if (newTitle === null) return; // User clicked Cancel
        const newContent = prompt("Edit Task Content:", task.content || "");

        const res = await fetch(`${API_URL}/tasks/${id}`, {
          method: "PUT",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({ title: newTitle, content: newContent || "" }),
        });

        if (res.ok) {
          showAlert("Task updated!");
          fetchTasks();
        } else {
          showAlert("Failed to update task.", true);
        }
      }

      async function deleteTask(id) {
        if (!confirm("Are you sure you want to delete this task?")) return;

        const res = await fetch(`${API_URL}/tasks/${id}`, {
          method: "DELETE",
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.ok) {
          showAlert("Task deleted!");
          fetchTasks();
        } else {
          showAlert("Failed to delete task.", true);
        }
      }

      // run on startup
      init();
    </script>
    >
  </body>
</html>
